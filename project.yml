name: VocabReader
options:
  developmentLanguage: zh-Hans
  bundleIdPrefix: com.vocabreader
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_TESTING_SEARCH_PATHS: YES
targets:
  VocabReader:
    type: application
    platform: iOS
    sources:
      - path: VocabReader
        createIntermediateGroups: true
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: N4TQ2P9B46
        CURRENT_PROJECT_VERSION: 202604132150
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.vocabreader.app
        INFOPLIST_FILE: VocabReader/Info.plist
    dependencies: []
  VocabReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VocabReaderTests
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vocabreader.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VocabReader.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VocabReader
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: VocabReader
