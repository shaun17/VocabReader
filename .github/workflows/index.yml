  <h1>Privacy Policy</h1>
  <p><strong>App Name:</strong> VocabReader<br />
     <strong>Effective Date:</strong> April 29, 2026<br />
     <strong>Last Updated:</strong> April 29, 2026</p>
  <p>Thank you for using VocabReader. This Privacy Policy explains how we collect, use, and protect your information when you use our application.</p>
  <h2>1. Information We Collect</h2>
  <ul>
    <li><strong>Account Information:</strong> Email address and username if you create an account.</li>
    <li><strong>Usage Data:</strong> Vocabulary lists accessed, reading progress, and session duration.</li>
    <li><strong>Device Information:</strong> Device type, OS version, and app version for debugging.</li>
  </ul>
  <h2>2. How We Use Your Information</h2>
  <ul>
    <li>Provide and improve VocabReader features.</li>
    <li>Sync your vocabulary and reading progress across devices.</li>
    <li>Diagnose technical issues and improve app stability.</li>
    <li>Respond to your support requests.</li>
  </ul>
  <h2>3. Data Sharing</h2>
  <p>We do not sell, trade, or rent your personal information to third parties. We may share anonymized, aggregated data for analytics. Service providers assisting in app operations are bound by strict confidentiality agreements.</p>
  <h2>4. Data Retention</h2>
  <p>We retain your data as long as your account is active. You may request deletion at any time by contacting us.</p>
  <h2>5. Children's Privacy</h2>
  <p>VocabReader is not directed to children under 13. We do not knowingly collect personal information from children under 13.</p>
  <h2>6. Data Security</h2>
  <p>We implement reasonable security measures to protect your information. No method of transmission over the Internet is 100% secure.</p>
  <h2>7. Your Rights and Contact</h2>
  <p>You have the right to access, correct, or delete your personal data. Contact us at:<br />
  <strong>Email:</strong> <a href="mailto:wenmsg@gmail.com">support@vocabreader.app</a></p>
  <h2>8. Changes to This Policy</h2>
  <p>We may update this policy from time to time. Continued use of the app after changes constitutes acceptance of the updated policy.</p>
  <footer><p>© 2026 VocabReader. All rights reserved.</p></footer>
